name: Test

on:
  push:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: 'x64'
          distribution: 'full'
          version: '9.1'
      - name: Install Packages and Dependencies
        run: raco pkg install --auto --batch web-server-compress/
      - name: Run Tests
        run: raco test web-server-compress/tests/
